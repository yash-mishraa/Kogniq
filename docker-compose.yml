services:
  postgres:
    image: postgres:16-alpine
    container_name: kogniq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kogniq}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kogniq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kogniq_network

  redis:
    image: redis:7-alpine
    container_name: kogniq_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kogniq_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kogniq_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kogniq.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kogniq_network

volumes:
  postgres_data:
    name: kogniq_postgres_data
  redis_data:
    name: kogniq_redis_data
  pgadmin_data:
    name: kogniq_pgadmin_data

networks:
  kogniq_network:
    name: kogniq_network
