[project]
name = "kogniq-jobs"
version = "0.1.0"
description = "Job Queue and Background Processing boundaries"
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    "kogniq-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jobs"]
