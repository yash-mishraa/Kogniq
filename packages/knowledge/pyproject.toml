[project]
name = "kogniq-knowledge"
version = "0.1.0"
description = "Kogniq knowledge domain logic"
requires-python = ">=3.12,<3.14"
authors = [{ name = "Yash Mishra", email = "yashmishra1408@gmail.com" }]
dependencies = [
    "google-genai",
    "kogniq-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knowledge"]

[tool.uv.sources]
kogniq-shared = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"
