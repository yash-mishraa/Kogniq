[project]
name = "kogniq-application"
version = "0.1.0"
description = "Application layer and cross-domain orchestration use cases."
requires-python = ">=3.13"
dependencies = [
    "kogniq-auth",
    "kogniq-jobs",
    "kogniq-knowledge",
    "kogniq-pipeline",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/application"]
