[project]
name = "kogniq-content"
version = "0.1.0"
description = "Kogniq content domain context"
requires-python = ">=3.12,<3.14"
authors = [{ name = "Yash Mishra" }]
dependencies = [
    "kogniq-shared",
    "pymupdf>=1.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/content"]

[tool.uv.sources]
kogniq-shared = { workspace = true }
