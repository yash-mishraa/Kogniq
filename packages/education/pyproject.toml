[project]
name = "kogniq-education"
version = "0.1.0"
description = "Educational Knowledge Layer for Kogniq"
requires-python = ">=3.12,<3.14"
authors = [{ name = "Yash Mishra", email = "yashmishra1408@gmail.com" }]

dependencies = [
    "kogniq-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/education"]

[tool.uv.sources]
kogniq-shared = { workspace = true }
