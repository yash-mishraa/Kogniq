[project]
name = "kogniq-backend"
version = "0.1.0"
description = "FastAPI Backend Foundation for Kogniq"
requires-python = ">=3.12"

dependencies = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.1",
    "pydantic-settings>=2.3.4",
    "python-multipart>=0.0.9",
    "kogniq-knowledge",
    "kogniq-learning-content",
    "kogniq-persistence",
    "kogniq-jobs",
    "kogniq-auth",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backend"]
