[project]
name = "kogniq-pipeline"
version = "0.1.0"
description = "Orchestration layer for Kogniq Document Intelligence"
authors = [{ name = "Kogniq" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "kogniq-content",
    "kogniq-embedding",
    "kogniq-knowledge",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline"]
