[project]
name = "kogniq-learning"
version = "0.1.0"
description = "Kogniq learning domain context"
requires-python = ">=3.12,<3.14"
authors = [{ name = "Yash Mishra", email = "yashmishra1408@gmail.com" }]
dependencies = [
    "kogniq-shared",
    "pydantic>=2.0,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/learning"]

[tool.uv.sources]
kogniq-shared = { workspace = true }
