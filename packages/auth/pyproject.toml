[project]
name = "kogniq-auth"
version = "0.1.0"
description = "Authentication Domain Foundation for Kogniq"
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.7.4",
    "pwdlib[argon2]>=0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/auth"]
