[project]
name = "kogniq-retrieval"
version = "0.1.0"
description = "Kogniq retrieval domain logic"
requires-python = ">=3.12,<3.14"
authors = [{ name = "Yash Mishra", email = "yashmishra1408@gmail.com" }]
dependencies = [
    "kogniq-shared",
    "kogniq-content",
    "kogniq-embedding",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/retrieval"]

[tool.uv.sources]
kogniq-shared = { workspace = true }
kogniq-content = { workspace = true }
kogniq-embedding = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"
