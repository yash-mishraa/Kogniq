[project]
name = "kogniq-embedding"
version = "0.1.0"
description = "Universal, provider-independent embedding domain for Kogniq."
authors = [{ name = "Yash Mishra", email = "yashmishra1408@gmail.com" }]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "kogniq-content",
    "sentence-transformers>=3.0.0",
    "torch>=2.0.0"
]

[tool.uv.sources]
kogniq-content = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"
